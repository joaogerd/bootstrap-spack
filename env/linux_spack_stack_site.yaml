platform: linux

modules:
  load:
    - gcc
    - openmpi
  optional: []

packages:
  external:
    - openmpi
    - hdf5
    - netcdf-c
    - netcdf-fortran

validation:
  strict: true

site:
  name: linux-example
  layout: spack-stack
  module_system: lmod
  build_jobs: 8
  core_compilers:
    - gcc@9.4.0

output:
  directory: .
